# Load .env from backend root
springdotenv:
  directory: ..

server:
  port: 8080

spring:
  application:
    name: api-gateway

  config:
    import: "optional:configserver:"

  cloud:
    config:
      enabled: false

    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

# Routes are defined programmatically in GatewayRoutesConfig.java
# CORS is handled by CorsConfig.java

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    fetch-registry: true
    register-with-eureka: true
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway,prometheus,metrics
  endpoint:
    health:
      show-details: always
    gateway:
      enabled: true
    prometheus:
      enabled: true
  tracing:
    sampling:
      probability: 1.0
    export:
      zipkin:
        endpoint: ${ZIPKIN_ENDPOINT:http://localhost:9411/api/v2/spans}
  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        http.server.requests: true
  observations:
    annotations:
      enabled: true

logging:
  pattern:
    correlation: '[${spring.application.name:},%X{traceId:-},%X{spanId:-}] '
  level:
    org.springframework.cloud.gateway: DEBUG
    org.springframework.cloud.gateway.server.mvc: DEBUG
    com.finpay.gateway: DEBUG

# JWT secret for admin route authorization (must match auth-service)
jwt:
  secret: ${JWT_SECRET}

# SpringDoc OpenAPI — aggregate all service specs in gateway Swagger UI
springdoc:
  swagger-ui:
    urls:
      - name: Auth Service
        url: /api-docs/auth-service
      - name: User Service
        url: /api-docs/user-service
      - name: Payment Service
        url: /api-docs/payment-service
      - name: Wallet Service
        url: /api-docs/wallet-service
      - name: Notification Service
        url: /api-docs/notification-service
    urls-primary-name: Auth Service

# Redis-backed rate limiting
rate-limiting:
  enabled: true
  default-rate: 100
  default-window-seconds: 60
  auth-rate: 20
  auth-window-seconds: 60
  admin-rate: 200
  admin-window-seconds: 60
