spring:
  # Datasource configured dynamically by Testcontainers via @ServiceConnection
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: test-google-client-id
            client-secret: test-google-client-secret
          github:
            client-id: test-github-client-id
            client-secret: test-github-client-secret
  cloud:
    config:
      enabled: false

eureka:
  client:
    enabled: false

# Disable distributed tracing in tests
management:
  tracing:
    sampling:
      probability: 0.0
    export:
      zipkin:
        endpoint: http://localhost:9411/api/v2/spans
        enabled: false

jwt:
  secret: test-secret-key-that-is-at-least-256-bits-long-for-hs256-algorithm-test
  access-token-expiration: 900000
  refresh-token-expiration: 604800000
  issuer: finpay-auth-service-test

oauth2:
  redirect-uri: http://localhost:5173/oauth2/callback

cookie:
  domain: localhost
  secure: false
  same-site: Lax

# Disable outbox polling during tests
outbox:
  poll-interval-ms: 999999999
  cleanup-interval-ms: 999999999

logging:
  level:
    com.finpay.auth: DEBUG
