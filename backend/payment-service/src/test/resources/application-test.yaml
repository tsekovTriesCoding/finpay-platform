spring:
  # Datasource configured dynamically by Testcontainers via @ServiceConnection
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
  cloud:
    config:
      enabled: false

eureka:
  client:
    enabled: false

# Disable outbox polling during tests
outbox:
  poll-interval-ms: 999999999
  cleanup-interval-ms: 999999999

logging:
  level:
    com.finpay.payment: DEBUG
