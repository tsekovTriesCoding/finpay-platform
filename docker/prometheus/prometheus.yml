# Prometheus Configuration for FinPay Platform
# Scrapes metrics from all Spring Boot microservices via /actuator/prometheus

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Zipkin
  - job_name: 'zipkin'
    static_configs:
      - targets: ['zipkin:9411']
    metrics_path: /prometheus

  # FinPay API Gateway
  - job_name: 'api-gateway'
    metrics_path: /actuator/prometheus
    scrape_interval: 10s
    static_configs:
      - targets: ['host.docker.internal:8080']
        labels:
          application: 'api-gateway'

  # FinPay Service Registry (Eureka)
  - job_name: 'service-registry'
    metrics_path: /actuator/prometheus
    scrape_interval: 10s
    static_configs:
      - targets: ['host.docker.internal:8761']
        labels:
          application: 'service-registry'

  # FinPay User Service
  - job_name: 'user-service'
    metrics_path: /actuator/prometheus
    scrape_interval: 10s
    static_configs:
      - targets: ['host.docker.internal:8081']
        labels:
          application: 'user-service'

  # FinPay Payment Service
  - job_name: 'payment-service'
    metrics_path: /actuator/prometheus
    scrape_interval: 10s
    static_configs:
      - targets: ['host.docker.internal:8082']
        labels:
          application: 'payment-service'

  # FinPay Notification Service
  - job_name: 'notification-service'
    metrics_path: /actuator/prometheus
    scrape_interval: 10s
    static_configs:
      - targets: ['host.docker.internal:8083']
        labels:
          application: 'notification-service'

  # FinPay Auth Service
  - job_name: 'auth-service'
    metrics_path: /actuator/prometheus
    scrape_interval: 10s
    static_configs:
      - targets: ['host.docker.internal:8084']
        labels:
          application: 'auth-service'

  # FinPay Wallet Service
  - job_name: 'wallet-service'
    metrics_path: /actuator/prometheus
    scrape_interval: 10s
    static_configs:
      - targets: ['host.docker.internal:8085']
        labels:
          application: 'wallet-service'
